<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sagar Stationery — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#fdf8f3;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans',sans-serif;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 10%,rgba(214,119,0,.1) 0%,transparent 60%);pointer-events:none;}
.card{background:#fff;border:1px solid #e8ddd0;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(180,100,0,.1);}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{font-size:52px;margin-bottom:8px;}
.logo-title{font-family:'Baloo 2',sans-serif;font-size:28px;font-weight:800;color:#c2570a;}
.logo-sub{font-size:13px;color:#a8926f;margin-top:3px;}
.fg{margin-bottom:14px;}
.flbl{display:block;font-size:11px;font-weight:600;color:#a8926f;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.finput{width:100%;background:#fdf8f3;border:1.5px solid #e8ddd0;border-radius:10px;padding:12px 14px;color:#1c1917;font-family:'Noto Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.finput:focus{border-color:#c2570a;}
.finput::placeholder{color:#c5b098;}
.btn{width:100%;background:linear-gradient(135deg,#e8630a,#c2570a);border:none;border-radius:10px;padding:14px;color:#fff;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:16px;cursor:pointer;margin-top:6px;transition:all .2s;}
.btn:hover{filter:brightness(1.07);}
.err{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:#dc2626;border-radius:8px;padding:10px 13px;font-size:13px;margin-top:12px;display:none;text-align:center;}
.footer{text-align:center;margin-top:22px;font-size:12px;color:#c5b098;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <div class="logo-title">Sagar Stationery</div>
    <div class="logo-sub">Shop Manager</div>
  </div>
  <div class="fg"><label class="flbl">Username</label><input type="text" class="finput" id="u" placeholder="admin ya dad" autocomplete="username"></div>
  <div class="fg"><label class="flbl">Password</label><input type="password" class="finput" id="p" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn" onclick="login()">Login Karo →</button>
  <div class="err" id="err"></div>
  <div class="footer">Sagar Stationery v1.0</div>
</div>
<script>
if(localStorage.getItem('kb_token')) window.location.href='/app.html';
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){
  const u=document.getElementById('u').value.trim(), p=document.getElementById('p').value;
  const btn=document.querySelector('.btn'), err=document.getElementById('err');
  err.style.display='none';
  if(!u||!p){showErr('Dono fields bharein');return;}
  btn.textContent='...';btn.disabled=true;
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok){showErr(d.error||'Login failed');return;}
    localStorage.setItem('kb_token',d.token);
    localStorage.setItem('kb_user',d.username);
    localStorage.setItem('kb_role',d.role);
    window.location.href='/app.html';
  }catch(e){showErr('Server se connect nahi ho raha');}
  finally{btn.textContent='Login Karo →';btn.disabled=false;}
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';}
</script>
</body>
</html>
